<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>リレー判定（写真撮影）</title>
  <style>
    video, canvas { width: 300px; }
    #result { font-size: 24px; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

<h2>TFLiteモデル読み込み</h2>

<input type="file" id="modelFile" accept=".tflite"><br><br>
<input type="file" id="labelFile" accept=".txt,.labels"><br><br>

<button id="loadBtn">モデルを読み込む</button>

<h3 id="status">モデル未読み込み</h3>

<hr>

<h2>カメラ</h2>
<video id="camera" autoplay playsinline></video><br>
<button id="captureBtn">撮影して判定</button>

<canvas id="captureCanvas" style="display:none;"></canvas>

<h3 id="result">結果：なし</h3>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1"></script>

<script>
let tfliteModel = null;
let labels = [];

// モデル読み込み
document.getElementById("loadBtn").onclick = async () => {
  const modelFile = document.getElementById("modelFile").files[0];
  const labelFile = document.getElementById("labelFile").files[0];

  if (!modelFile || !labelFile) {
    alert("model_unquant.tflite と labels の両方を選んでください");
    return;
  }

  labels = (await labelFile.text()).trim().split("\n");

  const modelBuffer = await modelFile.arrayBuffer();
  tfliteModel = await tflite.loadTFLiteModel(modelBuffer);

  document.getElementById("status").innerText = "モデル読み込み完了";
};

// カメラ起動
(async () => {
  const video = document.getElementById("camera");
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
})();

// 撮影して判定
document.getElementById("captureBtn").onclick = async () => {
  if (!tfliteModel) {
    alert("モデルが読み込まれていません");
    return;
  }

  const video = document.getElementById("camera");
  const canvas = document.getElementById("captureCanvas");
  const ctx = canvas.getContext("2d");

  // 224x224 にリサイズしてキャプチャ
  canvas.width = 224;
  canvas.height = 224;
  ctx.drawImage(video, 0, 0, 224, 224);

  const input = tf.browser.fromPixels(canvas)
    .expandDims(0)
    .toFloat();

  const output = tfliteModel.predict(input);
  const scores = output.dataSync();

  let maxIdx = 0;
  for (let i = 1; i < scores.length; i++) {
    if (scores[i] > scores[maxIdx]) maxIdx = i;
  }

  const label = labels[maxIdx];
  const jpLabel = label === "normal" ? "正常" : "異常";

  document.getElementById("result").innerText =
    `結果：${jpLabel}（${label} / スコア：${scores[maxIdx].toFixed(3)}）`;

  input.dispose();
  output.dispose();
};
</script>

</body>
</html>
