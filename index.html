<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>リレーの判定（実験用）</title>
    <style>
      video, canvas, img { width: 300px; }
      #result { font-size: 24px; font-weight: bold; margin-top: 10px; }
      #capturedImage { display: none; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h2>カメラ（外側）</h2>
    <video id="video" autoplay playsinline></video>

    <br><br>
    <button id="captureButton">撮影して判定</button>
    <button id="retryButton" style="display:none;">もう一度撮影</button>

    <hr>

    <!-- 撮影した画像を表示 -->
    <img id="capturedImage">

    <!-- 推論用の隠しキャンバス -->
    <canvas id="canvas" width="224" height="224" style="display:none;"></canvas>

    <h3 id="result">モデル読み込み中...</h3>

    <!-- TFLite Web API -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1/dist/tf-tflite.min.js"></script>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const capturedImage = document.getElementById("capturedImage");
      const result = document.getElementById("result");
      const retryButton = document.getElementById("retryButton");

      // 外カメラ起動
      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } }
          });
          video.srcObject = stream;
        } catch (e) {
          console.warn("外カメラ不可 → 内カメラに切替:", e);
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
        }
      }
      startCamera();

      // モデルとラベル
      let model;
      let labels = [];

      async function loadModel() {
        const modelResponse = await fetch("model_unquant.tflite");
        const modelBuffer = await modelResponse.arrayBuffer();
        model = await tflite.loadTFLiteModel(modelBuffer);

        const labelResponse = await fetch("labels.txt");
        labels = (await labelResponse.text()).trim().split("\n");

        result.innerText = "モデル読み込み完了";
      }
      loadModel();

      // 撮影して推論
      captureButton.onclick = async () => {
        result.innerText = "判定中...";

        // ① video → canvas にコピー（224×224）
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, 224, 224);

        // ② canvas の内容を画像として表示（＝写真で止める）
        capturedImage.src = canvas.toDataURL("image/png");
        capturedImage.style.display = "block";

        // カメラ映像を隠す
        video.style.display = "none";
        retryButton.style.display = "inline-block";

        // ③ canvas → Tensor
        const imgTensor = tf.browser.fromPixels(canvas)
          .expandDims(0)
          .toFloat()
          .div(255.0);

        // ④ 推論（Safari対応：await data()）
        const output = await model.predict(imgTensor);
        const scores = await output.data();

        // ⑤ 最大スコアのラベルを取得（2クラス）
        const maxIndex = scores[0] > scores[1] ? 0 : 1;

        const label = labels[maxIndex];
        const confidence = (scores[maxIndex] * 100).toFixed(1);

        // ⑥ 結果表示
        result.innerText = `${label}（${confidence}%）`;

        imgTensor.dispose();
      };

      // もう一度撮影
      retryButton.onclick = () => {
        capturedImage.style.display = "none";
        video.style.display = "block";
        retryButton.style.display = "none";
        result.innerText = "モデル読み込み完了";
      };
    </script>
  </body>
</html>
